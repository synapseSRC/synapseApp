name: 🚀 Build (Multiplatforms)

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_SYNAPSE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_SYNAPSE_ANON_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
  ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
  
  # Compatible memory options for all platforms
  GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g -Dorg.gradle.daemon=false

jobs:
  # --- 1. ANDROID BUILD ---
  android:
    name: 🤖 Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
      - name: Build APK
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi
      - name: Upload to GH Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-pkg
          path: app/build/outputs/apk/**/*.apk

  # --- 2. IOS SHARED LOGIC ---
  ios-shared:
    name: 🍎 iOS Framework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Build Framework
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64
      - name: Upload to GH Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: shared/build/classes/kotlin/ios**

  # --- 3. DESKTOP MATRIX ---
  desktop:
    name: 💻 Desktop (${{ matrix.os_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux
            ext: deb
          - os: windows-latest
            os_name: Windows
            ext: msi
          - os: macos-latest
            os_name: macOS
            ext: dmg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Package
        run: ./gradlew :desktop:packageDistributionForCurrentOS
      - name: Upload to GH Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os_name }}
          path: desktop/build/compose/binaries/main/${{ matrix.ext }}/*
          if-no-files-found: warn

  # --- 4. UPLOAD TO TELEGRAM (Using Telethon for >50MB files) ---
  upload-telegram:
    name: 📢 Telegram Upload
    needs: [android, desktop, ios-shared]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Telethon
        run: pip install telethon

      - name: Upload Binaries (Android & Desktop)
        shell: bash
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          # 1. Upload Android APK
          APK_FILE=$(find ./all-artifacts/android-pkg -name "*.apk" | head -n 1)
          if [ -f "$APK_FILE" ]; then
            echo "Uploading Android APK via Telethon..."
            export APK_PATH="$APK_FILE"
            python .github/workflows/deploy_artifacts.py
          fi

          # 2. Upload Desktop Binaries
          for OS in Windows Linux macOS; do
            FILE=$(find "./all-artifacts/desktop-$OS" -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.dmg" -o -name "*.exe" \) | head -n 1)
            if [ -f "$FILE" ]; then
              echo "Uploading $OS Build ($FILE) via Telethon..."
              export APK_PATH="$FILE" # Script uses APK_PATH variable name for the file
              python .github/workflows/deploy_artifacts.py
            fi
          done

      - name: Final Notification
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d message_thread_id="${{ secrets.TELEGRAM_TOPIC_ID }}" \
          -d text="✅ <b>Build successful and uploaded!</b>%0ABranch: <code>${{ github.ref_name }}</code>" \
          -d parse_mode="HTML"
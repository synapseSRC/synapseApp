name: 🚀 Full Multiplatform Build

on:
  push:
    branches:
      - '**'          # Triggers on all branches
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:  # Manual trigger

env:
  # Supabase Configuration
  SUPABASE_URL: ${{ secrets.SUPABASE_SYNAPSE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_SYNAPSE_ANON_KEY }}
  
  # Storage & API Keys
  SUPABASE_SYNAPSE_S3_ENDPOINT_URL: ${{ secrets.SUPABASE_SYNAPSE_S3_ENDPOINT_URL }}
  SUPABASE_SYNAPSE_S3_ENDPOINT_REGION: ${{ secrets.SUPABASE_SYNAPSE_S3_ENDPOINT_REGION }}
  SUPABASE_SYNAPSE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_SYNAPSE_S3_ACCESS_KEY_ID }}
  SUPABASE_SYNAPSE_S3_ACCESS_KEY: ${{ secrets.SUPABASE_SYNAPSE_S3_ACCESS_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
  
  # Auth Config
  GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
  GOOGLE_WEB_CLIENT_SECRET: ${{ secrets.GOOGLE_WEB_CLIENT_SECRET }}
  ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
  
  # Gradle Performance Tuning
  GRADLE_OPTS: "-Xmx6g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs='-Xmx6g -XX:MaxMetaspaceSize=1g'"

jobs:
  # 1. ANDROID JOB
  build-android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build Android App
        run: |
          if [ "${{ github.ref_name }}" == "main" ] || [ "${{ github.ref_name }}" == "master" ]; then
            echo "Running Release Build for Main Branch..."
            ./gradlew assembleRelease
          else
            echo "Running Debug Build for Branch: ${{ github.ref_name }}..."
            ./gradlew assembleDebug
          fi

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.ref_name }}
          path: app/build/outputs/apk/**/*.apk

  # 2. iOS JOB (Compiles Shared KMP Framework)
  build-ios:
    name: 🍎 iOS Framework
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build KMP iOS Framework
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64 :shared:compileKotlinIosArm64

      - name: Upload Framework Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-shared-framework-${{ github.ref_name }}
          path: shared/build/classes/kotlin/ios**

  # 3. DESKTOP JOB (Matrix for Windows, Mac, Linux)
  build-desktop:
    name: 💻 Desktop (${{ matrix.os_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux
          - os: windows-latest
            os_name: Windows
          - os: macos-latest
            os_name: macOS
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Package Desktop Distribution
        run: ./gradlew :desktop:packageDistributionForCurrentOS

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os_name }}-${{ github.ref_name }}
          path: desktop/build/compose/binaries/main/

  # 4. NOTIFICATION JOB
  notify-telegram:
    name: 📢 Notify Telegram
    needs: [build-android, build-ios, build-desktop]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Requests
        run: pip install requests

      - name: Send Summary to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Logic: "success" only if all parent jobs passed
          BUILD_STATUS: ${{ (needs.build-android.result == 'success' && needs.build-ios.result == 'success' && needs.build-desktop.result == 'success') && 'success' || 'failure' }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: python .github/workflows/notify_telegram.py
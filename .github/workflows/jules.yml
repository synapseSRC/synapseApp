name: Jules Agent
on:
  issue_comment:
    types: [created]

jobs:
  jules:
    if: contains(github.event.comment.body, '/jules')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm install -g tsx
          npm install @actions/core @actions/github @google/jules-sdk marked
      - name: Run Jules Agent
        run: |
          cat << 'EOF' > package.json
          {
            "type": "module",
            "dependencies": {
              "@actions/core": "^1.10.1",
              "@actions/github": "^6.0.0",
              "@google/jules-sdk": "latest",
              "marked": "^17.0.0"
            }
          }
          EOF
          cat << 'EOF' > jules-agent.ts
          import * as core from '@actions/core';
          import * as github from '@actions/github';
          import { jules } from '@google/jules-sdk';
          import { marked } from 'marked';

          /** Extracts '/jules <message>' from a comment body. */
          function parseCommand(body: string): string | null {
            const tokens = marked.lexer(body);
            for (const token of tokens) {
              if (token.type !== 'paragraph') continue;
              const text = token.text.trim();
              if (text === '/jules') return '';
              if (text.startsWith('/jules ')) return text.slice('/jules '.length).trim();
            }
            return null;
          }

          /** Detects session ID from Jules branch name (e.g. jules/fix-1234567). */
          async function parseReplyTarget(context: any, token?: string): Promise<{ sessionId: string; sha?: string } | null> {
            let branch = "";
            let sha = "";

            if (context.payload.pull_request) {
              branch = context.payload.pull_request.head.ref;
              sha = context.payload.pull_request.head.sha;
            } else if (context.payload.issue?.pull_request && token) {
              const octokit = github.getOctokit(token);
              const { data: pr } = await octokit.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              branch = pr.head.ref;
              sha = pr.head.sha;
            }

            if (!branch) return null;

            const parts = branch.split('-');
            const lastPart = parts[parts.length - 1];
            if (lastPart && /^\d{7,}$/.test(lastPart)) {
              return { sessionId: lastPart, sha };
            }
            return null;
          }

          /** Fetches failed CI check summaries. */
          async function fetchFailedChecks(owner: string, repo: string, sha?: string, token?: string): Promise<string | null> {
            if (!sha || !token) return null;
            try {
              const octokit = github.getOctokit(token);
              const { data } = await octokit.rest.checks.listForRef({ owner, repo, ref: sha });
              const failures = data.check_runs
                .filter(run => run.conclusion === 'failure')
                .map(run => `- **${run.name}**: ${run.output?.summary ?? 'Failed'}`);
              return failures.length > 0 ? failures.join('\n') : null;
            } catch {
              return null;
            }
          }

          async function run() {
            const apiKey = process.env.JULES_API_KEY;
            const token = process.env.GITHUB_TOKEN;
            if (!apiKey) return core.setFailed('JULES_API_KEY is missing.');

            const context = github.context;
            const commentBody = context.payload.comment?.body ?? '';
            const message = parseCommand(commentBody);
            
            if (message === null) return core.info('No /jules command found. Skipping.');

            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const replyTarget = await parseReplyTarget(context, token);

            try {
              if (replyTarget) {
                core.info(`Replying to existing session: ${replyTarget.sessionId}`);
                const session = jules.session(replyTarget.sessionId);
                const ciContext = await fetchFailedChecks(context.repo.owner, context.repo.repo, replyTarget.sha, token);
                const fullMessage = ciContext ? `${message}\n\n## Failed CI Checks\n${ciContext}` : message;
                
                await session.send(fullMessage);
                core.info('Message sent to existing session.');
              } else {
                const baseBranch = context.payload.pull_request?.base?.ref || 'main';
                core.info(`Creating new session for ${repo} on ${baseBranch}`);
                const session = await jules.session({
                  prompt: message || 'Help me with this repository.',
                  source: { github: repo, baseBranch },
                  autoPr: true,
                });
                core.info(`Session created: ${session.id}`);
                const outcome = await session.result();
                core.info(`Final State: ${outcome.state}`);
                if (outcome.pullRequest) core.info(`PR Created: ${outcome.pullRequest.url}`);
              }
            } catch (err) {
              core.setFailed(err instanceof Error ? err.message : String(err));
            }
          }

          run();
          EOF
          npx tsx jules-agent.ts
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT }}

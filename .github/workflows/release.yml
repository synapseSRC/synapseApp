name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Select version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Increment version
        id: version_bump
        run: |
          # Parse current projectVersion from gradle.properties
          CURRENT_VERSION=$(grep "projectVersion=" gradle.properties | cut -d'=' -f2)
          echo "Current version: $CURRENT_VERSION"

          # Parse current versionCode from app/build.gradle
          CURRENT_VERSION_CODE=$(grep "versionCode =" app/build.gradle | head -n 1 | sed 's/.*versionCode = \([0-9]*\).*/\1/')
          echo "Current version code: $CURRENT_VERSION_CODE"

          # Increment version code
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
          echo "New version code: $NEW_VERSION_CODE"

          # Parse semantic version
          IFS='.' read -ra ADDR <<< "$CURRENT_VERSION"
          MAJOR=${ADDR[0]}
          MINOR=${ADDR[1]}
          PATCH=${ADDR[2]}

          BUMP_TYPE="${{ github.event.inputs.version_bump }}"

          if [ "$BUMP_TYPE" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version name: $NEW_VERSION"

          # Update gradle.properties
          sed -i "s/projectVersion=.*/projectVersion=$NEW_VERSION/" gradle.properties

          # Update app/build.gradle - be specific about the line
          sed -i "s/versionCode = $CURRENT_VERSION_CODE/versionCode = $NEW_VERSION_CODE/" app/build.gradle

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release_key.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=app/release_key.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SYNAPSE_S3_ENDPOINT_URL: ${{ secrets.SUPABASE_SYNAPSE_S3_ENDPOINT_URL }}
          SUPABASE_SYNAPSE_S3_ENDPOINT_REGION: ${{ secrets.SUPABASE_SYNAPSE_S3_ENDPOINT_REGION }}
          SUPABASE_SYNAPSE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_SYNAPSE_S3_ACCESS_KEY_ID }}
          SUPABASE_SYNAPSE_S3_ACCESS_KEY: ${{ secrets.SUPABASE_SYNAPSE_S3_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties app/build.gradle
          git commit -m "Bump version to ${{ steps.version_bump.outputs.new_version }}"
          git tag ${{ steps.version_bump.outputs.new_tag }}
          git push origin ${{ github.ref_name }}
          git push origin ${{ steps.version_bump.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_bump.outputs.new_tag }}
          name: Release ${{ steps.version_bump.outputs.new_version }}
          body: |
            ${{ github.event.inputs.release_notes || 'Automated release' }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Desktop Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'desktop/**'
      - 'shared/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'desktop/**'
      - 'shared/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/desktop-build.yml'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      if: runner.os != 'Windows'
      run: chmod +x gradlew

    - name: Build and Package Desktop App
      run: ./gradlew :desktop:packageDistributionForCurrentOS --no-daemon

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: synapse-desktop-${{ matrix.os }}
        path: |
          desktop/build/compose/binaries/main/**/*.deb
          desktop/build/compose/binaries/main/**/*.dmg
          desktop/build/compose/binaries/main/**/*.msi
        if-no-files-found: warn

name: 🚀 Desktop Build

on:
  push:
    branches:
      - '**'          # ✅ Triggers on every push to any branch
    paths:
      - 'desktop/**'
      - 'shared/**'
      - '.github/workflows/**'
  workflow_dispatch:  # 🖱️ Allows manual run from the Actions tab

jobs:
  build-desktop:
    name: Build & Notify
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: 🔨 Build Desktop App
        run: ./gradlew :desktop:packageDistributionForCurrentOS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-${{ github.ref_name }} # 🏷️ Includes branch name
          path: desktop/build/compose/binaries/main/
          if-no-files-found: error

      - name: 📢 Notify Telegram
        if: always() # 🔔 Runs even if build fails to notify you of the error
        run: python3 .github/workflows/notify_telegram.py
        env:
          # Fixed: These match the os.environ.get() keys in your script
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_STATUS: ${{ job.status }}

name: 🚀 Desktop Build

on:
  push:
    branches:
      - '**'          # 🛠️ Matches every branch (including nested ones like feature/xyz)
    paths:
      - 'desktop/**'
      - 'shared/**'
      - '.github/workflows/**'
  workflow_dispatch:  # 🖱️ Allows manual triggering from any branch

jobs:
  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: 🔨 Build Desktop App
        run: ./gradlew :desktop:packageDistributionForCurrentOS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-${{ github.ref_name }} # 🏷️ Named after the branch
          path: desktop/build/compose/binaries/main/

      - name: 📢 Notify Telegram
        if: always()
        run: python3 .github/workflows/notify_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_STATUS: ${{ job.status }}